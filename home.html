<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI BMI Calculator - Portable Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="transition-colors duration-500 font-sans">
    <div id="app" class="min-h-screen relative overflow-hidden transition-all duration-700">
        <!-- Background Gradients -->
        <div id="bg-grad" class="fixed inset-0 pointer-events-none transition-all duration-1000"></div>
        
        <!-- Navigation -->
        <nav class="relative z-50 flex items-center justify-between px-6 py-6 md:px-12 max-w-7xl mx-auto">
            <div class="flex items-center gap-4">
                <div class="bg-white/80 backdrop-blur-xl p-2 rounded-2xl shadow-lg border border-white/50">
                    <i data-lucide="activity" class="text-blue-600 w-6 h-6"></i>
                </div>
                <span id="logo-text" class="text-xl font-black tracking-tight">
                    VitalFlow <span class="text-blue-500">Health</span>
                </span>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" id="theme-btn" class="flex items-center gap-3 px-6 py-3 rounded-2xl font-black text-sm transition-all border shadow-lg backdrop-blur-xl bg-white/80 text-slate-900 border-white/60 hover:scale-105 active:scale-95">
                    <i id="theme-icon" data-lucide="moon" class="w-[18px] h-[18px]"></i>
                    <span id="theme-text">โหมดมืด</span>
                </button>
                <button class="p-2.5 rounded-2xl bg-white/30 backdrop-blur-md border border-white/40 text-slate-900 transition-all hover:bg-white/50">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="relative z-10 max-w-5xl mx-auto px-4 py-8 md:py-20 flex flex-col items-center">
            <h1 id="main-title" class="text-3xl md:text-6xl font-black text-center mb-8 md:mb-16 tracking-tighter text-slate-900 leading-tight">
                BMI <span class="text-blue-600">Standard</span> System
            </h1>

            <div class="w-full flex flex-col items-center gap-8 md:gap-12">
                <div class="flex flex-col md:flex-row items-center justify-center gap-10 md:gap-24 relative w-full">
                    
                    <!-- Height Input -->
                    <div class="flex flex-col items-center gap-4 md:gap-8 group w-full md:w-auto">
                        <div id="label-h" class="text-sm md:text-base font-black text-slate-400 uppercase tracking-tighter group-hover:text-blue-500 transition-colors">
                            ส่วนสูง (ซม.)
                        </div>
                        <div class="relative">
                            <input type="number" id="height" placeholder="170" class="w-44 md:w-48 h-24 md:h-32 rounded-[2.5rem] md:rounded-[3rem] text-center text-5xl md:text-6xl font-black focus:outline-none focus:ring-[15px] ring-blue-500/10 transition-all placeholder:text-slate-400/20 shadow-2xl bg-white/30 border border-white/40 text-slate-900">
                            <i id="icon-ruler" data-lucide="ruler" class="absolute -right-12 md:-right-16 top-1/2 -translate-y-1/2 w-8 h-8 md:w-12 md:h-12 text-slate-900 opacity-100 transition-colors duration-500"></i>
                        </div>
                    </div>

                    <!-- Gauge Display -->
                    <div class="relative w-56 h-56 md:w-80 md:h-80 flex items-center justify-center shrink-0">
                        <svg viewBox="0 0 100 100" class="w-full h-full transform -rotate-90">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="8" class="text-slate-200/30"></circle>
                            <circle cx="50" cy="50" r="45" fill="none" id="gauge-progress" stroke="url(#blue-grad)" stroke-width="8" stroke-dasharray="282.7" stroke-dashoffset="282.7" stroke-linecap="round" class="transition-all duration-1000 ease-out"></circle>
                            <defs>
                                <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#3b82f6" />
                                    <stop offset="100%" stop-color="#60a5fa" />
                                </linearGradient>
                            </defs>
                        </svg>
                        <div class="absolute inset-3 md:inset-4 rounded-full bg-white/40 backdrop-blur-3xl shadow-inner flex items-center justify-center border border-white/60">
                            <div class="text-center">
                                <div id="display-val" class="text-4xl md:text-6xl font-black text-blue-600 transition-all tracking-tighter">0.0</div>
                                <div class="text-[10px] font-black uppercase tracking-widest text-slate-400 mt-1 md:mt-2">Score</div>
                            </div>
                        </div>
                    </div>

                    <!-- Weight Input -->
                    <div class="flex flex-col items-center gap-4 md:gap-8 group w-full md:w-auto">
                        <div id="label-w" class="text-sm md:text-base font-black text-slate-400 uppercase tracking-tighter group-hover:text-blue-500 transition-colors">
                            น้ำหนัก (กก.)
                        </div>
                        <div class="relative">
                            <i id="icon-scale" data-lucide="scale" class="absolute -left-12 md:-left-16 top-1/2 -translate-y-1/2 w-8 h-8 md:w-12 md:h-12 text-slate-900 opacity-100 transition-colors duration-500"></i>
                            <input type="number" id="weight" placeholder="65" class="w-44 md:w-48 h-24 md:h-32 rounded-[2.5rem] md:rounded-[3rem] text-center text-5xl md:text-6xl font-black focus:outline-none focus:ring-[15px] ring-blue-500/10 transition-all placeholder:text-slate-400/20 shadow-2xl bg-white/30 border border-white/40 text-slate-900">
                        </div>
                    </div>
                </div>

                <!-- Calculate Button -->
                <div class="z-30 w-full flex justify-center px-4">
                    <button onclick="calculateBMI()" class="w-full max-w-xs md:w-auto px-10 md:px-14 py-5 md:py-6 backdrop-blur-3xl rounded-[2rem] md:rounded-[2.5rem] font-black text-base md:text-lg uppercase tracking-tight shadow-xl hover:shadow-2xl transition-all flex items-center justify-center gap-4 border border-white/60 bg-white/80 text-slate-900 hover:scale-105 active:scale-95 group">
                        <span>คำนวณ</span>
                        <i data-lucide="move-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>

                <!-- Result Card -->
                <div id="result-container" class="mt-8 md:mt-12 text-center min-h-[6rem] opacity-0 translate-y-4 transition-all duration-500 w-full px-4">
                    <div id="bmi-label" class="font-black text-base md:text-lg uppercase tracking-tight px-8 md:px-10 py-4 rounded-[1.5rem] md:rounded-[2rem] border border-white/40 shadow-xl backdrop-blur-md inline-block max-w-full">
                        ผลลัพธ์จะปรากฏที่นี่
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
